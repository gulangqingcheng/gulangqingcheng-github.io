services:
  jekyll:
    image: jekyll/jekyll:latest
    container_name: jekyll-blog
    volumes:
      - ./:/srv/jekyll
    ports:
      - "4000:4000"
    environment:
      - JEKYLL_ENV=development
      - LANG=C.UTF-8
    working_dir: /srv/jekyll
    entrypoint: ["bash", "-c", "gem install webrick && /usr/jekyll/bin/jekyll serve --host 0.0.0.0 --watch"]